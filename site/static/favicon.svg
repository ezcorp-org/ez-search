<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F4C430"/>
      <stop offset="100%" stop-color="#E8922D"/>
    </linearGradient>
    <linearGradient id="handleGrad" x1="0.3" y1="0.3" x2="0.8" y2="0.8">
      <stop offset="0%" stop-color="#F4C430"/>
      <stop offset="100%" stop-color="#D4820A"/>
    </linearGradient>
    <clipPath id="lensClip">
      <circle cx="200" cy="200" r="152"/>
    </clipPath>
  </defs>

  <!-- Shadow under glass -->
  <circle cx="210" cy="210" r="170" fill="#000" opacity="0.3"/>

  <!-- Lens background -->
  <circle cx="200" cy="200" r="152" fill="#2D1B4E"/>

  <!-- EZ text inside lens -->
  <g clip-path="url(#lensClip)">
    <!-- E letter -->
    <path d="M100,140 h80 v28 h-48 v24 h40 v26 h-40 v26 h50 v28 h-82 z" fill="#E8365D"/>
    <!-- Z letter -->
    <path d="M200,140 h90 v24 l-58,76 h60 v32 h-96 v-24 l58-76 h-54 z" fill="#E8365D"/>
  </g>

  <!-- Lens highlight (subtle sheen) -->
  <ellipse cx="165" cy="155" rx="80" ry="50" fill="#fff" opacity="0.06" transform="rotate(-20,165,155)"/>

  <!-- Glass ring -->
  <circle cx="200" cy="200" r="165" fill="none" stroke="url(#ring)" stroke-width="28"/>

  <!-- Handle -->
  <rect x="340" y="330" width="52" height="160" rx="26" fill="url(#handleGrad)" transform="rotate(45,366,410)"/>
</svg>
